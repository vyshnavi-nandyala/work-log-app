version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: worklog
      POSTGRES_PASSWORD: worklog123
      POSTGRES_DB: worklogdb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U worklog -d worklogdb']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
